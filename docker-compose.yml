services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__ # Evitar conflitos de cache
    environment:
      - DATABASE_URL=sqlite:///biostat.db
      - GOOGLE_API_KEY=AIzaSyCibhp0sp8Xb2B8uXXdb3xG1JVayPZhvqE
    networks:
      - scistat-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Evitar sobrepor módulos locais com os do contêiner
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    networks:
      - scistat-network

networks:
  scistat-network:
    driver: bridge
